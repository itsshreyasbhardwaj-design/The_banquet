[build]
  command   = "npm run build"
  publish   = "out"

[build.environment]
  NODE_VERSION             = "18"
  NEXT_TELEMETRY_DISABLED  = "1"

# ─── Security headers on all routes ──────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options              = "DENY"
    X-Content-Type-Options       = "nosniff"
    X-DNS-Prefetch-Control       = "on"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    Strict-Transport-Security    = "max-age=63072000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy   = "same-origin-allow-popups"
    Content-Security-Policy      = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.qrserver.com; frame-src https://maps.google.com https://www.google.com; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

# ─── SPA fallback — not needed for Next.js static export
# (each page gets its own index.html, no client-side routing fallback required)

# ─── Cache static assets aggressively ────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"
